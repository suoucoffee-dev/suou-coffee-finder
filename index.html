<title>Suou Coffee Factory — 豆診断</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --brown:#3d1e0e;
  --brown2:#5a2d14;
  --caramel:#b5722a;
  --amber:#d4953f;
  --yellow:#e8c84b;
  --blue:#5b9bd5;
  --green:#6aaa6a;
  --cream:#fdf5e8;
  --sand:#f0dfc0;
  --mist:#e8d4b0;
  --text:#2a1206;
  --sub:rgba(61,30,14,.6);
  --line:rgba(61,30,14,.12);
}
html,body{
  width:100%;min-height:100vh;
  background:var(--brown);
  font-family:'Noto Sans JP',sans-serif;
  overflow-x:hidden;
}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:0;
}

/* ── HEADER ── */
.header{
  width:100%;background:var(--brown);
  padding:18px 32px 14px;
  display:flex;align-items:center;gap:18px;
  border-bottom:2px solid rgba(181,114,42,.3);
  position:sticky;top:0;z-index:10;
}
.logo-img{
  width:60px;height:60px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
}
.header-text h1{
  font-family:'Nunito',sans-serif;
  font-size:20px;color:white;font-weight:800;letter-spacing:.04em;
  line-height:1.2;
}
.header-text p{
  font-size:12px;color:var(--amber);
  letter-spacing:.15em;text-transform:uppercase;margin-top:2px;
}
.header-badge{
  margin-left:auto;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:6px 14px;
  font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.12em;
}

/* ── MAIN CARD ── */
.main{
  width:100%;max-width:1100px;
  padding:28px 40px 48px;
}

/* progress */
.prog-wrap{margin-bottom:28px}
.prog-meta{
  display:flex;justify-content:space-between;
  font-size:11px;letter-spacing:.15em;color:rgba(255,255,255,.55);
  margin-bottom:8px;
}
.prog-pct{color:var(--amber);font-weight:600}
.prog-track{
  height:4px;background:rgba(255,255,255,.1);
  border-radius:2px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--caramel),var(--yellow));
  border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* question card */
.q-card{
  background:var(--cream);border-radius:16px;
  padding:40px 48px 44px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  animation:rise .35s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.q-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--brown);color:var(--yellow);
  font-size:10px;letter-spacing:.2em;font-weight:700;
  padding:5px 12px;border-radius:20px;
  margin-bottom:14px;text-transform:uppercase;
}
.q-title{
  font-family:'Nunito',sans-serif;
  font-size:30px;color:var(--text);font-weight:800;
  line-height:1.35;margin-bottom:10px;
}
.q-hint{
  font-size:12px;color:var(--sub);line-height:1.7;
  padding:10px 14px;
  background:rgba(181,114,42,.07);
  border-left:3px solid var(--amber);
  border-radius:0 6px 6px 0;
  margin-bottom:22px;
}

/* option grid — タブレット: 4択=2×2、3択=3列 */
.opts{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}
.opts.cols3{grid-template-columns:repeat(3,1fr);}
/* スマホ */
@media(max-width:600px){
  .opts,.opts.cols3{grid-template-columns:1fr;gap:10px;}
  .opt{padding:14px 16px;min-height:auto;flex-direction:row;align-items:center;gap:12px;}
  .opt-icon{font-size:24px;}
  .opt-main{font-size:14px;}
  .q-title{font-size:20px;}
  .main{padding:16px 16px 32px;}
  .header{padding:14px 18px 12px;}
  .header-text h1{font-size:17px;}
  .top3-grid{grid-template-columns:1fr;}
  .afford-grid{grid-template-columns:1fr;}
  .q-card{padding:24px 20px 28px;}
  .res-card{padding:20px 18px 24px;}
  .rank-badge{width:38px;min-height:48px;}
  .rank-num{font-size:17px;}
  .res-name1{font-size:13px;}
  .res-name2{font-size:10px;}
  .res-price-tag{font-size:11px;}
  .res-comment{font-size:12px;-webkit-line-clamp:3;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}
  .rtag{font-size:10px;}
  .afford-item{gap:8px;}
  .afford-n1{font-size:12px;}
  .afford-desc{font-size:11px;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;}
}
.opt{
  background:white;
  border:2px solid var(--line);
  border-radius:14px;padding:24px 20px;
  cursor:pointer;text-align:left;
  transition:border-color .15s,background .15s,transform .12s;
  display:flex;flex-direction:column;align-items:flex-start;gap:10px;
  min-height:120px;
}
.opt:hover,.opt:active{
  border-color:var(--amber);
  background:#fffaf2;
  transform:scale(1.02);
}
.opt-icon{
  font-size:34px;flex-shrink:0;line-height:1;
}
.opt-main{
  font-size:16px;color:var(--text);font-weight:700;
  line-height:1.35;margin-bottom:2px;
}
.opt-sub{font-size:12.5px;color:var(--sub);line-height:1.5}

/* ── RESULT ── */
.res-card{
  background:var(--cream);border-radius:12px;
  padding:28px 32px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  animation:rise .4s ease both;
}
.res-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:1px solid var(--line);
}
.res-head-title{
  font-family:'Nunito',sans-serif;
  font-size:16px;color:var(--text);font-weight:800;
}
.res-count{font-size:12px;color:var(--sub);margin-left:auto}

/* top-3 grid */
.top3-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:16px;margin-bottom:20px;
}
@media(max-width:700px){
  .top3-grid{grid-template-columns:1fr;}
  .res-item-head{min-height:auto;}
  .res-card{padding:20px 16px 24px;}
}
.res-item{
  background:white;border:2px solid var(--line);
  border-radius:10px;overflow:hidden;
}
.res-item.rank1{border-color:var(--amber);box-shadow:0 2px 12px rgba(181,114,42,.18)}

.res-item-head{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--line);
}
.rank-badge{
  width:44px;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--brown);padding:10px 0;gap:2px;
}
.rank1 .rank-badge{background:linear-gradient(160deg,var(--caramel),var(--amber))}
.rank-num{
  font-family:'Nunito',sans-serif;
  font-size:20px;color:white;font-weight:800;line-height:1;
}
.rank-lbl{font-size:8px;color:rgba(255,255,255,.65);letter-spacing:.12em}
.res-name-block{padding:10px 12px;flex:1}
.res-name1{font-size:13px;color:var(--text);font-weight:700;line-height:1.3;margin-bottom:2px}
.res-name2{font-size:10px;color:var(--sub);line-height:1.3}
.res-price-tag{
  margin:8px 12px 0;
  display:inline-block;
  background:var(--sand);border:1px solid var(--mist);
  padding:3px 9px;border-radius:20px;
  font-size:12px;color:var(--caramel);font-weight:700;
}

.res-item-body{padding:12px}
.res-comment{font-size:11.5px;color:var(--text);line-height:1.75;opacity:.85;margin-bottom:10px}
.reason-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.rtag{
  display:flex;align-items:center;gap:3px;
  background:rgba(181,114,42,.08);
  border:1px solid rgba(181,114,42,.2);
  border-radius:20px;padding:3px 8px;
  font-size:10px;color:var(--caramel);
}

/* mini flavor bars */
.mini-bars{display:flex;gap:8px}
.mbar{flex:1;text-align:center}
.mbar-lbl{font-size:9px;color:var(--sub);margin-bottom:3px;letter-spacing:.04em}
.mbar-track{height:4px;background:rgba(61,30,14,.1);border-radius:2px;overflow:hidden;margin-bottom:2px}
.mbar-fill{height:100%;background:linear-gradient(90deg,var(--caramel),var(--yellow));border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1) .3s}
.mbar-val{font-size:9px;color:var(--caramel);font-weight:600}

/* affordable alts */
.afford-wrap{
  background:white;border:1.5px solid var(--line);
  border-radius:10px;padding:16px 18px;margin-bottom:20px;
}
.afford-title{
  font-size:10px;letter-spacing:.2em;color:var(--caramel);
  text-transform:uppercase;font-weight:700;margin-bottom:12px;
}
.afford-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.afford-item{
  display:flex;gap:8px;align-items:flex-start;
}
.afford-dot{
  width:20px;height:20px;border-radius:50%;
  background:var(--brown);color:var(--yellow);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.afford-n1{font-size:12.5px;color:var(--text);font-weight:700;margin-bottom:1px}
.afford-n2{font-size:10px;color:var(--sub);margin-bottom:3px}
.afford-desc{font-size:11px;color:var(--sub);line-height:1.5}
.afford-price{font-size:11px;color:var(--caramel);font-weight:700;margin-top:3px}

/* action bar */
.action-bar{
  display:flex;gap:10px;
}
.btn-restart{
  flex:1;padding:15px;
  background:var(--brown);color:white;
  border:none;border-radius:8px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.15em;
  transition:background .18s;
}
.btn-restart:hover{background:var(--brown2)}
.auto-reset-wrap{margin-top:12px;text-align:center}
.auto-reset-track{height:3px;background:rgba(61,30,14,.1);border-radius:2px;overflow:hidden;margin-bottom:6px}
.auto-reset-fill{height:100%;background:linear-gradient(90deg,var(--caramel),var(--amber));border-radius:2px;transition:width 1s linear}
.auto-reset-txt{font-size:11px;color:var(--sub);letter-spacing:.08em}

/* confirm overlay */
.confirm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;
  z-index:200;
}
.confirm-box{
  background:var(--cream);border-radius:14px;
  padding:28px 26px 22px;width:min(320px,86vw);
  text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.confirm-icon{font-size:32px;margin-bottom:10px;}
.confirm-box h3{font-family:'Nunito',sans-serif;font-size:18px;color:var(--text);font-weight:800;margin-bottom:8px;}
.confirm-box p{font-size:12.5px;color:var(--sub);line-height:1.7;margin-bottom:20px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btn-keep{
  flex:1;padding:13px;background:var(--brown);color:white;
  border:none;border-radius:8px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;
  transition:background .15s;
}
.confirm-btn-keep:hover{background:var(--brown2)}
.confirm-btn-reset{
  flex:1;padding:13px;background:transparent;
  color:var(--sub);border:1.5px solid var(--line);
  border-radius:8px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
}

/* staff notice bar */
.staff-notice{
  background:linear-gradient(135deg,var(--brown) 0%,var(--brown2) 100%);
  border-radius:10px;padding:14px 18px;margin-bottom:16px;
  text-align:center;
}
.staff-notice-label{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.2em;margin-bottom:6px;}
.staff-notice-nos{
  font-family:'Nunito',sans-serif;font-size:24px;
  color:var(--yellow);font-weight:800;letter-spacing:.15em;
}

/* bean no badge on card */
.bean-no-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--brown);color:var(--yellow);
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
  padding:3px 9px;border-radius:20px;
  margin:6px 12px 0;letter-spacing:.06em;
}

/* color accents from logo */
.accent-blue{color:var(--blue)}
.accent-green{color:var(--green)}
.accent-yellow{color:var(--yellow)}

.hidden{display:none!important}
</style>
</head>

// 種別ごとの価格帯を豆データから自動計算
function calcPriceRange(){
  const stdCats=['スタンダード','オリジナルブレンド'];
  const midCats=['スペシャリティー','スペシャリティ','スペシャルティ','デカフェ'];
  const premCats=['スーパースペシャリティー'];
  const prices=(cats)=>BEANS.filter(b=>cats.includes(b.cat)).map(b=>getPrice(b)).filter(v=>v>0);
  const fmt=(arr)=>arr.length?'¥'+Math.min(...arr).toLocaleString()+'〜¥'+Math.max(...arr).toLocaleString()+'/100g':'';
  return {
    budget: fmt(prices(stdCats)),
    mid:    fmt(prices(midCats)),
    premium:fmt(prices(premCats)),
  };
}

let autoResetTimer=null;
const AUTO_RESET_SEC=180; // 3分

function startAutoReset(){
  clearAutoReset();
  let remaining=AUTO_RESET_SEC;
  const bar=document.getElementById('autoResetBar');
  const txt=document.getElementById('autoResetTxt');
  if(bar)bar.style.width='100%';

  autoResetTimer=setInterval(()=>{
    remaining--;
    const pct=(remaining/AUTO_RESET_SEC)*100;
    if(bar)bar.style.width=pct+'%';
    if(txt)txt.textContent=`${remaining}秒後に自動でリセットします`;
    if(remaining===30){
      // 残り30秒で確認ダイアログ表示・タイマー停止
      clearAutoReset();
      showConfirmDialog();
    }
    if(remaining<=0){clearAutoReset();restart();}
  },1000);
}

function showConfirmDialog(){
  const ov=document.createElement('div');
  ov.className='confirm-overlay';
  ov.id='confirmOverlay';
  ov.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-icon">⏱</div>
      <h3>まだ見ていますか？</h3>
      <p>しばらく操作がありませんでした。<br>そのまま続けますか？</p>
      <div class="confirm-btns">
        <button class="confirm-btn-keep" onclick="keepSession()">続ける</button>
        <button class="confirm-btn-reset" onclick="confirmReset()">リセット</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function keepSession(){
  const ov=document.getElementById('confirmOverlay');
  if(ov)ov.remove();
  // タイマー再開（残り時間リセット）
  startAutoReset();
}

function confirmReset(){
  const ov=document.getElementById('confirmOverlay');
  if(ov)ov.remove();
  restart();
}

function clearAutoReset(){
  if(autoResetTimer){clearInterval(autoResetTimer);autoResetTimer=null;}
}

function score(b,a){
  let s=0;
  const acidT={love:3.5,mild:2.5,dislike:1.5,hate:1}[a.acidSens]??2.5;
  s-=Math.abs(b.acid-acidT)*2.5;
  const bitterT={strong:4,medium:3,light:2}[a.bitter]??3;
  s-=Math.abs(b.bitter-bitterT)*2;
  let bodyT=3;
  if(a.scene==='morning'||a.bitter==='light')bodyT=2;
  if(a.scene==='focus'||a.bitter==='strong')bodyT=4;
  if(a.brew==='milk')bodyT=Math.max(bodyT,3.5);
  s-=Math.abs(b.body-bodyT)*1.5;
  const roastT={light:2.5,medium:4.5,dark:6.5}[a.roast]??4.5;
  s-=Math.abs(b.roast-roastT)*1.2;
  const ft=FTAGS[b.no]||{choco:0,fruity:0,earthy:0,clean:0};
  const fl=a.flavor||'clean';
  const flScore=ft[fl]||0;
  s+=Math.min(flScore,6)*0.55;
  for(const[ofl,oScore]of Object.entries(ft)){
    if(ofl!==fl&&oScore>flScore)s-=(oScore-flScore)*0.25;
  }
  const isRare=b.cat==='スーパースペシャリティー'||b.price>=3000;
  const isClassic=b.cat==='スタンダード'||b.cat==='オリジナルブレンド';
  const isUnique=['アナエロビ','インフューズド','ストロベリー','バレルエイジド','コピルアック'].some(k=>b.n2.includes(k));
  if(a.adventure==='classic'){s+=isClassic?1.5:0;s-=isRare?0.5:0;}
  else if(a.adventure==='explore'){s+=isUnique?0.8:0;s+=(!isClassic&&!isRare)?0.4:0;}
  else{s+=isRare?2:0;s+=isUnique?1:0;s-=isClassic?0.5:0;}
  if(a.brew==='espresso')s+=b.roast>=5?0.8:0;
  if(a.brew==='iced')s+=(b.bitter>=3&&b.body>=3)?0.8:0;
  if(a.brew==='milk')s+=b.body>=4?0.8:0;
  if(a.scene==='morning')s+=(b.acid>=2&&b.bitter<=3)?0.5:0;
  if(a.scene==='relax')s+=(b.body>=3&&b.bitter<=3)?0.5:0;
  if(a.scene==='focus')s+=b.bitter>=3?0.5:0;
  if(a.scene==='after_meal')s+=(b.bitter>=2&&b.acid<=3)?0.5:0;
  return s;
}
// 在庫管理画面と同じキーでlocalStorageから在庫を読み込む
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vS3aY18PiOtoCh7sqSRR50QQWSB0bVUcR2YrwDkDNFOhgYP-30y-Z8NAGQOsuFstT5EEd-O4pLXnh9N/pub?gid=1921417510&single=true&output=csv';
const STORAGE_KEY='suou_inventory_v1';
const PRICE_KEY='suou_prices_v1';
let inventoryStock={};
let priceOverrides={};

async function loadInventory(){
  // まずlocalStorageのキャッシュを読み込む（オフライン対応）
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved) inventoryStock=JSON.parse(saved);
    else BEANS.forEach(b=>inventoryStock[b.no]=true);
  }catch(e){ BEANS.forEach(b=>inventoryStock[b.no]=true); }
  try{
    const saved=localStorage.getItem(PRICE_KEY);
    if(saved) priceOverrides=JSON.parse(saved);
  }catch(e){}

  // スプレッドシートから最新データを取得
  try{
    const res=await fetch(SHEET_URL);
    const csv=await res.text();
    const rows=csv.trim().split('\n').slice(1);
    console.log('スプレッドシート読み込み成功。行数:', rows.length);
    console.log('先頭3行:', rows.slice(0,3));
    const newStock={};
    const newPrices={};
    rows.forEach(row=>{
      const cols=row.split(',');
      const no=parseInt(cols[0]);
      if(!no) return;
      const stockVal=cols[4]?.trim().toUpperCase();
      const inStock=stockVal!=='FALSE'&&stockVal!=='0'&&stockVal!=='';
      newStock[no]=inStock;
      newStock[String(no)]=inStock;
      const p100=parseInt(cols[5])||0;
      const p200=parseInt(cols[6])||0;
      const p500=parseInt(cols[7])||0;
      if(p100||p200||p500){
        newPrices[no]={};
        if(p100) newPrices[no].p100=p100;
        if(p200) newPrices[no].p200=p200;
        if(p500) newPrices[no].p500=p500;
      }
    });
    console.log('在庫OFFの豆:', Object.entries(newStock).filter(([,v])=>!v).map(([k])=>k));
    inventoryStock=newStock;
    priceOverrides=newPrices;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(inventoryStock));
    localStorage.setItem(PRICE_KEY,JSON.stringify(priceOverrides));
  }catch(e){
    console.log('スプレッドシート読み込み失敗:', e);
  }
}

function getPrice(b){
  return priceOverrides[b.no]?.p100 ?? b.price;
}
// グラム別価格テキスト生成
function getPriceText(b){
  const ov=priceOverrides[b.no];
  if(!ov) return `¥${b.price.toLocaleString()}/100g`;
  const parts=[];
  if(ov.p100) parts.push(`¥${ov.p100.toLocaleString()}/100g`);
  if(ov.p200) parts.push(`¥${ov.p200.toLocaleString()}/200g`);
  if(ov.p500) parts.push(`¥${ov.p500.toLocaleString()}/500g`);
  return parts.length>0 ? parts.join('　') : `¥${b.price.toLocaleString()}/100g`;
}

function isAvail(b,a){
  // 在庫管理画面でOFFにされた豆は除外
  if(inventoryStock[b.no]===false||inventoryStock[b.no]===0||inventoryStock[String(b.no)]===false||inventoryStock[String(b.no)]===0) return false;
  if(b.outOfStock||b.comingSoon)return false;
  const d=b.cat==='デカフェ';
  if(a.decaf==='decaf'&&!d)return false;
  if(a.decaf==='normal'&&d)return false;
  // 種別ベースのフィルタリング
  if(a.priceTier&&a.priceTier!=='any'){
    const stdCats=['スタンダード','オリジナルブレンド'];
    const midCats=['スペシャリティー','スペシャリティ','スペシャルティ','デカフェ'];
    const premCats=['スーパースペシャリティー'];
    if(a.priceTier==='budget'&&!stdCats.includes(b.cat))return false;
    if(a.priceTier==='mid'&&!midCats.includes(b.cat))return false;
    if(a.priceTier==='premium'&&!premCats.includes(b.cat))return false;
  }
  const meta=BEAN_META[b.no]||{};
  // Region filter
  if(a.region&&a.region!=='any'&&meta.region!==a.region)return false;
  return true;
}

  if(a.bitter==='strong'&&b.bitter>=4)r.push({i:'⚡',t:'しっかりした苦味・コクが好みに一致'});
  if(a.bitter==='light'&&b.bitter<=2)r.push({i:'🌸',t:'苦味が少なく飲みやすい'});
  if(a.bitter==='medium'&&b.bitter===3)r.push({i:'☯️',t:'苦味・コクのバランスが好みに合う'});
  if(a.roast==='light'&&b.roast<=3)r.push({i:'☀️',t:'浅煎りのフレッシュな風味'});
  if(a.roast==='dark'&&b.roast>=6)r.push({i:'🌑',t:'深煎りの豊かなコク'});
  if(a.roast==='medium'&&b.roast>=4&&b.roast<=5)r.push({i:'🌤',t:'中煎りのバランスの良さ'});
  if(a.flavor==='choco'&&b.body>=3)r.push({i:'🍫',t:'チョコ・ナッツ系の風味'});
  if(a.flavor==='fruity'&&b.acid>=3)r.push({i:'🍊',t:'フルーティな香りと風味'});
  if(a.flavor==='earthy'&&b.body>=4)r.push({i:'🌿',t:'大地感のある個性的なコク'});
  if(a.flavor==='clean'&&b.acid<=2&&b.bitter<=2)r.push({i:'🫧',t:'雑味なくクリーンな後味'});
  if(a.scene==='morning'&&b.acid>=2)r.push({i:'🌅',t:'朝の目覚めに合う爽やかさ'});
  if(a.scene==='relax'&&b.body>=3)r.push({i:'🌙',t:'リラックスタイムに合う深み'});
  if(a.brew==='milk'&&b.body>=3)r.push({i:'🥛',t:'ミルクと相性が良いコク'});
  if(a.brew==='iced'&&b.bitter>=3)r.push({i:'🧊',t:'アイスにしても風味が際立つ'});
  if(a.brew==='espresso'&&b.roast>=5)r.push({i:'☕',t:'エスプレッソに向く深い焙煎'});
  if(a.adventure==='classic'&&(b.cat==='スタンダード'||b.cat==='オリジナルブレンド'))r.push({i:'🏆',t:'定番・飲みやすさで選んだ'});
  if(a.adventure==='bold'&&(b.cat==='スーパースペシャリティー'||b.price>=3000))r.push({i:'🚀',t:'希少・プレミアムな一杯'});
  const meta=BEAN_META[b.no]||{};
  if(a.region==='africa'&&meta.region==='africa')r.push({i:'🌍',t:'アフリカ産の華やかな風味'});
  if(a.region==='latam'&&meta.region==='latam')r.push({i:'🌎',t:'中南米産のバランスの良さ'});
  if(a.region==='asia'&&meta.region==='asia')r.push({i:'🌏',t:'アジア産の個性的な味わい'});
  if(a.priceTier==='budget'&&['スタンダード','オリジナルブレンド'].includes(b.cat))r.push({i:'🌿',t:'スタンダードグレードの飲みやすい豆'});
  if(a.priceTier==='premium'&&b.cat==='スーパースペシャリティー')r.push({i:'✨',t:'希少なスーパースペシャリティー'});
  return r.slice(0,3);
}

function renderQ(){
  const total=Qs.length;
  const pct=Math.round((step/total)*100);
  document.getElementById('progStep').textContent=`質問 ${step+1} / ${total}`;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  const q=Qs[step];
  // 1問目だけ価格帯を動的に差し込む
  let opts=q.opts;
  if(q.id==='priceTier'){
    const pr=calcPriceRange();
    opts=q.opts.map(o=>{
      if(o.v==='budget') return {...o,s:'定番の飲みやすい豆・ブレンド中心'+(pr.budget?' ('+pr.budget+')':'')};
      if(o.v==='mid')    return {...o,s:'産地や農園にこだわった高品質な豆'+(pr.mid?' ('+pr.mid+')':'')};
      if(o.v==='premium')return {...o,s:'希少で最高級の特別な一杯'+(pr.premium?' ('+pr.premium+')':'')};
      return o;
    });
  }
  const el=document.getElementById('qBody');
  el.innerHTML=`
    <div class="q-card">
      <div class="q-chip">☕ ${q.label}</div>
      <div class="q-title">${q.text}</div>
      ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
      <div class="opts${q.cols===3?' cols3':''}">
        ${opts.map(o=>`
          <button class="opt" onclick="pick('${q.id}','${o.v}')">
            <div class="opt-icon">${o.i}</div>
            <div>
              <div class="opt-main">${o.t}</div>
              <div class="opt-sub">${o.s}</div>
            </div>
          </button>
        `).join('')}
      </div>
      ${step>0?`<div style="margin-top:16px;text-align:left"><button onclick="goBack()" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--sub);letter-spacing:.08em;padding:8px 4px;">← 前の質問に戻る</button></div>`:''}
    </div>
  `;
}

function goBack(){
  if(step>0){step--;renderQ();}
}

function pick(id,val){
  ans[id]=val;
  if(step<Qs.length-1){step++;renderQ();}
  else showResult();
}

function showResult(){
  document.getElementById('progFill').style.width='100%';
  document.getElementById('progPct').textContent='100%';
  document.getElementById('progStep').textContent='診断完了';
  let avail=BEANS.filter(b=>isAvail(b,ans));
  let relaxMsg='';

  if(avail.length<3){
    // Step1: 価格帯だけ外す
    const ans1={...ans,priceTier:'any'};
    const avail1=BEANS.filter(b=>isAvail(b,ans1));
    if(avail1.length>=3){
      avail=avail1;
      const tierLabel={budget:'スタンダード',mid:'スペシャリティー',premium:'スーパースペシャリティー'}[ans.priceTier];
      relaxMsg=tierLabel?`選んだ価格帯（${tierLabel}）では候補が少なかったため、価格帯の条件を広げて表示しています。`:'価格帯の条件を広げて表示しています。';
    } else {
      // Step2: 産地だけ外す
      const ans2={...ans,region:'any'};
      const avail2=BEANS.filter(b=>isAvail(b,ans2));
      if(avail2.length>=3){
        avail=avail2;
        const regionLabel={africa:'アフリカ系',latam:'中南米系',asia:'アジア・太平洋系'}[ans.region];
        relaxMsg=regionLabel?`選んだ産地（${regionLabel}）では候補が少なかったため、産地の条件を広げて表示しています。`:'産地の条件を広げて表示しています。';
      } else {
        // Step3: 両方外す
        const ans3={...ans,priceTier:'any',region:'any'};
        const avail3=BEANS.filter(b=>isAvail(b,ans3));
        if(avail3.length>0){
          avail=avail3;
          relaxMsg='価格帯・産地の両方の条件を広げて表示しています。';
        }
      }
    }
  }

  if(avail.length===0){
    document.getElementById('qBody').classList.add('hidden');
    const rb=document.getElementById('resBody');
    rb.classList.remove('hidden');
    rb.innerHTML=`<div class="res-card"><div class="res-head"><div class="res-head-title">☕ 診断結果</div></div>
      <div style="text-align:center;padding:32px 16px;">
        <div style="font-size:36px;margin-bottom:12px;">🔍</div>
        <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;">条件に合う豆が見つかりませんでした</div>
        <div style="font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:24px;">産地・価格帯・カフェインの条件を変えると見つかるかもしれません。</div>
        <button class="btn-restart" onclick="restart()">もう一度試す</button>
      </div></div>`;
    startAutoReset();
    return;
  }

  const scored=avail.map(b=>({bean:b,sc:score(b,ans)})).sort((a,b)=>b.sc-a.sc);
  const top3=scored.slice(0,3).map(s=>s.bean);
  const top1p=top3[0]?getPrice(top3[0]):9999;
  const alts=scored.slice(3,20).filter(s=>{
    const b=s.bean;
    // デカフェ選択時はデカフェ豆のみ、通常時はデカフェ除外
    if(ans.decaf==='decaf'&&b.cat!=='デカフェ') return false;
    if(ans.decaf==='normal'&&b.cat==='デカフェ') return false;
    return getPrice(b)<=top1p*.72||(top1p>2000&&getPrice(b)<=1200);
  }).slice(0,3).map(s=>s.bean);
  const rkLbl=['ベストマッチ','次点','3位'];
  const cardsHtml=top3.map((b,i)=>{
    const rs=reasons(b,ans);
    const rtags=rs.map(r=>`<div class="rtag"><span>${r.i}</span>${r.t}</div>`).join('');
    const bars=[{l:'酸味',v:b.acid,m:5},{l:'苦味',v:b.bitter,m:5},{l:'コク',v:b.body,m:5}];
    const barsHtml=bars.map(br=>`<div class="mbar"><div class="mbar-lbl">${br.l}</div><div class="mbar-track"><div class="mbar-fill" style="width:0%" data-t="${(br.v/br.m)*100}%"></div></div><div class="mbar-val">${br.v}</div></div>`).join('');
    return`<div class="res-item${i===0?' rank1':''}">
      <div class="res-item-head">
        <div class="rank-badge"><div class="rank-num">${i+1}</div><div class="rank-lbl">${rkLbl[i]}</div></div>
        <div class="res-name-block"><div class="res-name1">${b.n1}</div>${b.n2?`<div class="res-name2">${b.n2}</div>`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;padding:0 12px;margin-top:8px;">
        <div class="bean-no-badge">No. ${b.no}</div>
        <div class="res-price-tag">${getPriceText(b)}</div>
      </div>
      <div class="res-item-body">
        <div class="res-comment">${b.comment}</div>
        <div class="reason-tags">${rtags}</div>
        <div class="mini-bars">${barsHtml}</div>
      </div>
    </div>`;
  }).join('');

  // スタッフ案内：上位3件のNo.一覧
  const staffNos=top3.map(b=>`No.${b.no}`).join('　');
  const staffHtml=`<div class="staff-notice">
    <div class="staff-notice-label">ご希望の商品番号をスタッフにお伝えください</div>
    <div class="staff-notice-nos">${staffNos}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:6px;">上記の番号が棚の商品と対応しています</div>
  </div>`;
  const altHtml=alts.length
    ? `<div class="afford-wrap"><div class="afford-title">💡 近い味わいのお手頃な豆</div><div class="afford-grid">${alts.map((b,i)=>`<div class="afford-item"><div class="afford-dot">${i+1}</div><div><div class="afford-n1">${b.n1}</div>${b.n2?`<div class="afford-n2">${b.n2}</div>`:''}<div class="afford-desc">${b.comment}</div><div style="display:flex;align-items:center;gap:6px;margin-top:3px;"><div class="afford-price">${getPriceText(b)}</div><div style="font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;background:var(--brown);color:var(--yellow);padding:2px 7px;border-radius:10px;">No.${b.no}</div></div></div></div>`).join('')}</div></div>`
    : '';
  document.getElementById('qBody').classList.add('hidden');
  const rb=document.getElementById('resBody');
  rb.classList.remove('hidden');
  rb.innerHTML=`<div class="res-card"><div class="res-head"><div class="res-head-title">☕ あなたへのおすすめ</div><div class="res-count">上位${top3.length}候補</div></div>${relaxMsg?`<div style="font-size:12px;color:var(--sub);background:rgba(181,114,42,.07);border-left:3px solid var(--amber);padding:9px 13px;border-radius:0 6px 6px 0;margin-bottom:16px;">⚠️ ${relaxMsg}</div>`:''}${staffHtml}<div class="top3-grid">${cardsHtml}</div>${altHtml}<div class="action-bar"><button class="btn-restart" onclick="restart()">もう一度診断する</button></div><div class="auto-reset-wrap"><div class="auto-reset-track"><div class="auto-reset-fill" id="autoResetBar" style="width:100%"></div></div><div class="auto-reset-txt" id="autoResetTxt">180秒後に自動でリセットします</div></div></div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{rb.querySelectorAll('.mbar-fill').forEach(el=>{el.style.width=el.dataset.t})}));
  startAutoReset();
}

function restart(){
  clearAutoReset();
  ans={};step=0;
  document.getElementById('resBody').classList.add('hidden');
  document.getElementById('qBody').classList.remove('hidden');
  document.getElementById('qBody').className='';
  renderQ();
  window.scrollTo(0,0);
}
</script>
</body>
</html>
